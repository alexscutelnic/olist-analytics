version: 2

models:
  - name: mart_orders
    description: "Order-level fact table with enriched customer, delivery and review data. One row per order."
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: delivery_status
        tests:
          - accepted_values:
              values: ['on time', 'late', 'not delivered']
      - name: sentiment
        tests:
          - accepted_values:
              values: ['positive', 'neutral', 'negative', 'no review']

  - name: mart_revenue
    description: "Revenue aggregated by month, category, seller and geography"
    columns:
      - name: gross_revenue
        description: "Sum of item prices excluding freight"
        tests:
          - not_null
      - name: purchase_month
        tests:
          - not_null

  - name: mart_customers
    description: "One row per unique customer with lifetime value and segmentation"
    columns:
      - name: customer_unique_id
        tests:
          - unique
          - not_null
      - name: customer_segment
        tests:
          - accepted_values:
              values: ['one-time', 'repeat', 'loyal']