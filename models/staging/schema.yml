version: 2

models:
  - name: stg_orders
    description: "Cleaned and renamed orders from the Olist source system"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 
                       'invoiced', 'processing', 'created', 'approved']

  - name: stg_customers
    description: "Cleaned customer data"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_order_items
    description: "Individual line items within each order"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_order_payments
    description: "Payment records for each order"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null

  - name: stg_order_reviews
    description: "Customer reviews — cleaned from messy source CSV. Note: ~912 rows have null order_id due to malformed source data."
    columns:
      - name: review_id
        tests:
          - not_null:
              config:
                severity: warn
      - name: order_id
        tests:
          - not_null:
              config:
                severity: warn

  - name: stg_products
    description: "Product catalogue"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Seller information"
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null